<script>
async function detectCountry() {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    if (data.country === "IL") {
      window.location.href = "hebrew.html";
    }

  } catch (e) {
    console.log("Country detect failed");
  }
}

detectCountry();
</script>
